---
# Pre-setup validation role — validates environment per Hammerspace Tier 0 requirements
# Based on Hammerspace Tier 0 Deployment Guide v1.0
#
# Subtask files:
#   validate_drives.yml   — Drive count + mount status check
#   validate_numa.yml     — NUMA node balance check
#   validate_sectors.yml  — 4K sector size + optional NVMe format
#   validate_network.yml  — MTU / jumbo frame validation
#   validate_packages.yml — Package installation + command verification
#   validate_existing.yml — Existing mdadm/NFS configuration detection
#   iperf_test.yml        — Optional bandwidth test

# ============================================================================
# Initialize variables for --check mode compatibility
# ============================================================================

- name: Initialize precheck variables
  ansible.builtin.set_fact:
    nvme_count: 0
    scsi_count: 0
    drives_in_use: []
    numa_device_counts: {}
    nvme_sector_info: []
    drives_needing_4k_format: []
    mtu_results: []
    missing_packages: []

# ============================================================================
# Hardware RAID Detection
# ============================================================================

- name: Set hardware RAID mode for precheck
  ansible.builtin.set_fact:
    _precheck_hw_raid: "{{ (hw_raid_devices is defined and hw_raid_devices | length > 0 and not (use_raid | default(true))) | bool }}"

- name: Display hardware RAID precheck mode
  ansible.builtin.debug:
    msg: "Hardware RAID mode detected - skipping drive discovery, NUMA, and sector size checks"
  when: _precheck_hw_raid

# ============================================================================
# Drive Count + Mount Status (skipped for HW RAID)
# ============================================================================

- name: Validate drives
  ansible.builtin.include_tasks: validate_drives.yml
  when: not _precheck_hw_raid

# ============================================================================
# NUMA Balance (skipped for HW RAID)
# ============================================================================

- name: Validate NUMA balance
  ansible.builtin.include_tasks: validate_numa.yml
  when: not _precheck_hw_raid

# ============================================================================
# 4K Sector Size (skipped for HW RAID)
# ============================================================================

- name: Validate sector sizes
  ansible.builtin.include_tasks: validate_sectors.yml
  when: not _precheck_hw_raid

# ============================================================================
# MTU / Jumbo Frames
# ============================================================================

- name: Validate network
  ansible.builtin.include_tasks: validate_network.yml

# ============================================================================
# Packages
# ============================================================================

- name: Validate and install packages
  ansible.builtin.include_tasks: validate_packages.yml

# ============================================================================
# Existing Configuration
# ============================================================================

- name: Check existing configuration
  ansible.builtin.include_tasks: validate_existing.yml

# ============================================================================
# Optional: iperf Bandwidth Test
# ============================================================================

- name: Include iperf bandwidth test
  ansible.builtin.include_tasks: iperf_test.yml
  when:
    - iperf_test_enabled | default(false)
    - iperf_test_targets | default([]) | length > 0

# ============================================================================
# Validation Summary
# ============================================================================

- name: Validation summary (HW RAID mode)
  ansible.builtin.debug:
    msg: |
      ============================================
      PRE-SETUP VALIDATION SUMMARY (HW RAID MODE)
      ============================================
      Mode: Hardware RAID (software RAID skipped)
      HW RAID Devices: {{ hw_raid_devices | join(', ') }}

      Network:
        - MTU tests: {% if ping_results.results is defined %}{{ ping_results.results | selectattr('rc', 'equalto', 0) | list | length }}/{{ ping_results.results | length }} passed{% else %}not configured{% endif %}

      Packages:
        - Missing: {{ package_check.results | selectattr('rc', 'ne', 0) | map(attribute='item') | list | join(', ') | default('none') }}
      ============================================
  when: _precheck_hw_raid

- name: Validation summary
  ansible.builtin.debug:
    msg: |
      ============================================
      PRE-SETUP VALIDATION SUMMARY
      ============================================
      Storage Type: {{ storage_type | default('nvme') }}
      {% if storage_type | default('nvme') in ['nvme', 'all'] %}
      NVMe Drives:
        - Total found: {{ nvme_count }}
        - Expected: {{ expected_nvme_count | default('not specified') }}
      {% endif %}
      {% if storage_type | default('nvme') in ['hdd', 'ssd', 'scsi', 'all'] %}
      SCSI/SATA Drives:
        - Total found: {{ scsi_count }}
        - Expected: {{ expected_scsi_count | default('not specified') }}
      {% endif %}
      Drives:
        - In use (non-boot): {{ drives_in_use_non_boot | default([]) | length }}
        - Boot device: {{ boot_device_check.stdout | default('unknown') | trim }}

      NUMA Balance:
        {% for numa, count in numa_device_counts.items() %}
        - NUMA {{ numa }}: {{ count }} drives
        {% endfor %}
        - Status: {% if numa_device_counts | length <= 1 or (numa_device_counts.values() | list | max) == (numa_device_counts.values() | list | min) %}BALANCED{% else %}IMBALANCED{% endif %}

      Sector Size:
        - Expected: {{ expected_sector_size | default(4096) }} bytes
        - Drives needing format: {{ drives_needing_4k_format | length }}

      Network:
        - MTU tests: {% if ping_results.results is defined %}{{ ping_results.results | selectattr('rc', 'equalto', 0) | list | length }}/{{ ping_results.results | length }} passed{% else %}not configured{% endif %}

      Packages:
        - Missing: {{ package_check.results | selectattr('rc', 'ne', 0) | map(attribute='item') | list | join(', ') | default('none') }}
      ============================================

      Review the output above for any warnings before proceeding.
      ============================================
  when: not _precheck_hw_raid
