---
# Create S3 Server for object storage protocol access
# Called from main.yml with s3_server_config variable
# Reference: hs_ops s3_server_create.yml

- name: "Build S3 server payload for {{ s3_server_config.name }}"
  ansible.builtin.set_fact:
    s3_server_payload:
      _type: "S3_SERVER"
      name: "{{ s3_server_config.name }}"
      enabled: "{{ s3_server_config.enabled | default(true) }}"
      port: "{{ s3_server_config.port | default(9000) }}"
      tlsEnabled: "{{ s3_server_config.tls_enabled | default(false) }}"

- name: "Check if S3 server already exists"
  ansible.builtin.shell:
    cmd: >-
      curl -s -o /dev/stdout -w "\n%{http_code}" --max-time {{ hammerspace_api_curl_timeout | default(60) }}
      {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
      -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
      "{{ hs_api_url }}/s3server"
  register: s3_server_check_raw
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Parse S3 server check result"
  ansible.builtin.set_fact:
    s3_server_check:
      status: "{{ (s3_server_check_raw.stdout_lines | default(['0']))[-1] | default('0') | int }}"
      json: "{{ ((s3_server_check_raw.stdout_lines | default(['{}']))[:-1] | join('\n') | trim | default('[]', true)) | from_json }}"

- name: "Create S3 server {{ s3_server_config.name }}"
  ansible.builtin.shell:
    cmd: >-
      curl -s -o /dev/stdout -w "\n%{http_code}" --max-time {{ hammerspace_api_curl_timeout | default(180) }}
      {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
      -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
      -X POST -H "Content-Type: application/json"
      -D /tmp/hs_s3_server_create_headers.txt
      -d '{{ s3_server_payload | to_json }}'
      "{{ hs_api_url }}/s3server"
  register: s3_server_create_raw
  changed_when: true
  when:
    - s3_server_check.status | int == 404 or s3_server_check.json is not defined or s3_server_check.json | length == 0
    - not ansible_check_mode

- name: "Extract location header from S3 server create"
  ansible.builtin.shell: |
    grep -i '^Location:' /tmp/hs_s3_server_create_headers.txt 2>/dev/null | awk '{print $2}' | tr -d '\r\n'
  register: s3_server_create_location_raw
  changed_when: false
  when:
    - s3_server_check.status | int == 404 or s3_server_check.json is not defined or s3_server_check.json | length == 0
    - not ansible_check_mode

- name: "Parse S3 server create result"
  ansible.builtin.set_fact:
    s3_server_create_result:
      status: "{{ (s3_server_create_raw.stdout_lines | default(['0']))[-1] | default('0') | int }}"
      json: "{{ ((s3_server_create_raw.stdout_lines | default(['{}']))[:-1] | join('\n') | trim | default('{}', true)) | from_json }}"
      location: "{{ s3_server_create_location_raw.stdout | default('') }}"
  when:
    - s3_server_check.status | int == 404 or s3_server_check.json is not defined or s3_server_check.json | length == 0
    - not ansible_check_mode

- name: "Wait for S3 server creation to complete"
  ansible.builtin.shell:
    cmd: >-
      curl -s --max-time {{ hammerspace_api_curl_timeout | default(60) }}
      {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
      -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
      "{{ s3_server_create_result.location }}"
  register: s3_server_status_raw
  changed_when: false
  until: (s3_server_status_raw.stdout | default('{}') | from_json).status | default('') in ["COMPLETED", "FAILED", "CANCELLED"]
  retries: 30
  delay: 5
  when:
    - not ansible_check_mode
    - s3_server_create_result.location | default('') | length > 0

- name: "Fail if S3 server creation task did not complete successfully"
  ansible.builtin.fail:
    msg: "Task ended with status: {{ (s3_server_status_raw.stdout | default('{}') | from_json).status | default('UNKNOWN') }}"
  when:
    - not ansible_check_mode
    - s3_server_status_raw is defined
    - s3_server_status_raw.stdout is defined
    - (s3_server_status_raw.stdout | default('{}') | from_json).status | default('') in ["FAILED", "CANCELLED"]

- name: "Display S3 server status"
  ansible.builtin.debug:
    msg: "S3 Server '{{ s3_server_config.name }}' configured on port {{ s3_server_config.port | default(9000) }}"
