---
# Create a Hammerspace share
# Called from main.yml with share_config variable

- name: "Build share payload for {{ share_config.name }}"
  ansible.builtin.set_fact:
    share_payload:
      name: "{{ share_config.name }}"
      path: "{{ share_config.path }}"
      exportOptions: "{{ share_config.export_options | default(default_share_export_options) }}"
      shareSizeLimit: "{{ share_config.size_limit | default('0') }}"
      warnUtilizationPercentThreshold: "{{ share_config.warn_threshold | default('90') }}"
    _share_hash: "{{ share_config.name | hash('md5') }}"

- name: "Check if share {{ share_config.name }} already exists"
  ansible.builtin.shell:
    cmd: >-
      curl -s -o /dev/stdout -w "\n%{http_code}" --max-time {{ hammerspace_api_curl_timeout | default(60) }}
      {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
      -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
      "{{ hs_api_url }}/shares/{{ share_config.name | urlencode }}"
  register: share_check_raw
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Parse share check result"
  ansible.builtin.set_fact:
    share_check:
      status: "{{ (share_check_raw.stdout_lines | default(['0']))[-1] | default('0') | int }}"
      json: "{{ ((share_check_raw.stdout_lines | default(['{}']))[:-1] | join('\n') | trim | default('{}', true)) | from_json }}"

- name: "Create share {{ share_config.name }}"
  ansible.builtin.shell:
    cmd: >-
      curl -s -o /dev/stdout -w "\n%{http_code}" --max-time {{ hammerspace_api_curl_timeout | default(180) }}
      {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
      -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
      -X POST -H "Content-Type: application/json"
      -D /tmp/hs_share_create_{{ _share_hash }}_headers.txt
      -d '{{ share_payload | to_json }}'
      "{{ hs_api_url }}/shares"
  register: share_create_raw
  changed_when: true
  when:
    - share_check.status | int == 404
    - not ansible_check_mode

- name: "Extract location header from share creation"
  ansible.builtin.shell: |
    grep -i '^Location:' /tmp/hs_share_create_{{ _share_hash }}_headers.txt 2>/dev/null | awk '{print $2}' | tr -d '\r\n'
  register: share_create_location_raw
  changed_when: false
  when:
    - share_check.status | int == 404
    - not ansible_check_mode

- name: "Parse share creation result"
  ansible.builtin.set_fact:
    share_create_result:
      status: "{{ (share_create_raw.stdout_lines | default(['0']))[-1] | default('0') | int }}"
      json: "{{ ((share_create_raw.stdout_lines | default(['{}']))[:-1] | join('\n') | trim | default('{}', true)) | from_json }}"
      location: "{{ share_create_location_raw.stdout | default('') }}"
  when:
    - share_check.status | int == 404
    - not ansible_check_mode

- name: "Wait for share {{ share_config.name }} creation to complete"
  ansible.builtin.shell:
    cmd: >-
      curl -s --max-time {{ hammerspace_api_curl_timeout | default(60) }}
      {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
      -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
      "{{ share_create_result.location }}"
  register: share_create_status_raw
  changed_when: false
  until: (share_create_status_raw.stdout | default('{}') | from_json).status | default('') in ["COMPLETED", "FAILED", "CANCELLED"]
  retries: 30
  delay: 2
  when:
    - not ansible_check_mode
    - share_create_result is defined
    - share_create_result.location | default('') | length > 0
    - share_create_result.status | int == 202

- name: "Fail if share creation task did not complete successfully"
  ansible.builtin.fail:
    msg: "Share creation task ended with status: {{ (share_create_status_raw.stdout | default('{}') | from_json).status | default('UNKNOWN') }}"
  when:
    - not ansible_check_mode
    - share_create_status_raw is defined
    - share_create_status_raw.stdout is defined
    - (share_create_status_raw.stdout | default('{}') | from_json).status | default('') in ["FAILED", "CANCELLED"]

- name: "Update existing share {{ share_config.name }}"
  when: share_check.status | int == 200
  block:
    - name: "Get current share details"
      ansible.builtin.shell:
        cmd: >-
          curl -s -o /dev/stdout -w "\n%{http_code}" --max-time {{ hammerspace_api_curl_timeout | default(60) }}
          {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
          -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
          "{{ hs_api_url }}/shares/{{ share_config.name | urlencode }}"
      register: current_share_raw
      changed_when: false
      failed_when: false
      check_mode: false

    - name: "Parse current share details"
      ansible.builtin.set_fact:
        current_share:
          status: "{{ (current_share_raw.stdout_lines | default(['0']))[-1] | default('0') | int }}"
          json: "{{ ((current_share_raw.stdout_lines | default(['{}']))[:-1] | join('\n') | trim | default('{}', true)) | from_json }}"

    - name: "Build update payload for {{ share_config.name }}"
      ansible.builtin.set_fact:
        share_update_payload: "{{ current_share.json | combine(share_payload, recursive=True) }}"
      when: hammerspace_update_existing_shares | default(false)

    - name: "Update share {{ share_config.name }}"
      ansible.builtin.shell:
        cmd: >-
          curl -s -o /dev/stdout -w "\n%{http_code}" --max-time {{ hammerspace_api_curl_timeout | default(180) }}
          {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
          -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
          -X PUT -H "Content-Type: application/json"
          -D /tmp/hs_share_update_{{ _share_hash }}_headers.txt
          -d '{{ share_update_payload | to_json }}'
          "{{ hs_api_url }}/shares/{{ current_share.json.uoid.uuid }}"
      register: share_update_raw
      changed_when: true
      when:
        - hammerspace_update_existing_shares | default(false)
        - not ansible_check_mode

    - name: "Parse share update result"
      ansible.builtin.set_fact:
        share_update_result:
          status: "{{ (share_update_raw.stdout_lines | default(['0']))[-1] | default('0') | int }}"
          json: "{{ ((share_update_raw.stdout_lines | default(['{}']))[:-1] | join('\n') | trim | default('{}', true)) | from_json }}"
      when:
        - hammerspace_update_existing_shares | default(false)
        - not ansible_check_mode

- name: "Display share {{ share_config.name }} status"
  ansible.builtin.debug:
    msg: >-
      Share '{{ share_config.name }}'
      {% if share_check.status | int == 200 %}already exists{% elif share_create_result is defined and share_create_result.status | default(0) | int == 202 %}created successfully{% else %}processed{% endif %}

# Apply share objective if specified in share_config
- name: "Apply objective to share {{ share_config.name }}"
  ansible.builtin.include_tasks: share_apply_objective.yml
  vars:
    share_objective_config:
      share_name: "{{ share_config.name }}"
      objective: "{{ share_config.objective }}"
      applicability: "{{ share_config.objective_applicability | default('TRUE') }}"
  when:
    - share_config.objective is defined
    - hammerspace_apply_share_objectives | default(false)
