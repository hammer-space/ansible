---
# Change Cluster Site Name
# Called from main.yml with site_config variable
# Reference: hs_ops cluster_change_site_name.yml

- name: "Get current site configuration"
  ansible.builtin.shell:
    cmd: >-
      curl -s -o /dev/stdout -w "\n%{http_code}" --max-time {{ hammerspace_api_curl_timeout | default(60) }}
      {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
      -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
      "{{ hs_api_url }}/sites/local"
  register: current_site_raw
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Parse current site configuration"
  ansible.builtin.set_fact:
    current_site:
      status: "{{ (current_site_raw.stdout_lines | default(['0']))[-1] | default('0') | int }}"
      json: "{{ ((current_site_raw.stdout_lines | default(['{}']))[:-1] | join('\n') | trim | default('{}', true)) | from_json }}"

- name: "Check if site name needs update"
  ansible.builtin.set_fact:
    site_name_changed: "{{ current_site.json.name != site_config.name }}"

- name: "Build combined site payload"
  ansible.builtin.set_fact:
    site_combined_payload: "{{ current_site.json | combine({'name': site_config.name}, recursive=True) }}"
  when: site_name_changed

- name: "Update site name to {{ site_config.name }}"
  ansible.builtin.shell:
    cmd: >-
      curl -s -o /dev/stdout -w "\n%{http_code}" --max-time {{ hammerspace_api_curl_timeout | default(180) }}
      {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
      -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
      -X PUT -H "Content-Type: application/json"
      -D /tmp/hs_site_update_headers.txt
      -d '{{ site_combined_payload | to_json }}'
      "{{ hs_api_url }}/sites/local"
  register: site_update_raw
  changed_when: true
  when:
    - not ansible_check_mode
    - site_name_changed

- name: "Extract site update location header"
  ansible.builtin.shell: |
    grep -i '^Location:' /tmp/hs_site_update_headers.txt 2>/dev/null | awk '{print $2}' | tr -d '\r\n'
  register: site_update_location_raw
  changed_when: false
  when:
    - not ansible_check_mode
    - site_update_raw is not skipped

- name: "Parse site update result"
  ansible.builtin.set_fact:
    site_update_result:
      status: "{{ (site_update_raw.stdout_lines | default(['0']))[-1] | default('0') | int }}"
      location: "{{ site_update_location_raw.stdout | default('') }}"
  when:
    - not ansible_check_mode
    - site_update_raw is not skipped

- name: "Wait for site name update to complete"
  ansible.builtin.shell:
    cmd: >-
      curl -s --max-time {{ hammerspace_api_curl_timeout | default(60) }}
      {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
      -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
      "{{ site_update_result.location }}"
  register: site_update_status_raw
  changed_when: false
  until: (site_update_status_raw.stdout | default('{}') | from_json).status | default('') in ["COMPLETED", "FAILED", "CANCELLED"]
  retries: 30
  delay: 5
  when:
    - not ansible_check_mode
    - site_update_result is defined
    - site_update_result.location | default('') | length > 0

- name: "Fail if site update did not complete successfully"
  ansible.builtin.fail:
    msg: "Site update task ended with status: {{ (site_update_status_raw.stdout | default('{}') | from_json).status | default('UNKNOWN') }}"
  when:
    - not ansible_check_mode
    - site_update_status_raw is defined
    - site_update_status_raw.stdout is defined
    - (site_update_status_raw.stdout | default('{}') | from_json).status | default('') in ["FAILED", "CANCELLED"]

- name: "Display site name update status"
  ansible.builtin.debug:
    msg: >-
      Site name:
      {% if not site_name_changed %}already set to '{{ site_config.name }}'{% else %}updated to '{{ site_config.name }}'{% endif %}
