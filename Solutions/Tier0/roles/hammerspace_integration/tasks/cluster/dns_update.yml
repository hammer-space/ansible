---
# Update DNS Configuration
# Called from main.yml with dns_config variable
# Reference: hs_ops dns_update.yml

- name: "Get current DNS configuration"
  ansible.builtin.shell:
    cmd: >-
      curl -s -o /dev/stdout -w "\n%{http_code}" --max-time {{ hammerspace_api_curl_timeout | default(60) }}
      {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
      -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
      "{{ hs_api_url }}/dnss"
  register: current_dns_raw
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Parse current DNS configuration"
  ansible.builtin.set_fact:
    current_dns:
      status: "{{ (current_dns_raw.stdout_lines | default(['0']))[-1] | default('0') | int }}"
      json: "{{ ((current_dns_raw.stdout_lines | default(['[]']))[:-1] | join('\n') | trim | default('[]', true)) | from_json }}"

- name: "Build DNS update payload"
  ansible.builtin.set_fact:
    dns_payload:
      primaryDnsServer: "{{ dns_config.primary_server }}"
      secondaryDnsServer: "{{ dns_config.secondary_server | default('') }}"
      searchDomains: "{{ dns_config.search_domains | default([]) }}"

- name: "Build combined DNS payload"
  ansible.builtin.set_fact:
    dns_combined_payload: "{{ current_dns.json[0] | combine(dns_payload, recursive=True) }}"
  when:
    - dns_config.primary_server is defined
    - current_dns.json | length > 0

- name: "Update DNS configuration"
  ansible.builtin.shell:
    cmd: >-
      curl -s -o /dev/stdout -w "\n%{http_code}" --max-time {{ hammerspace_api_curl_timeout | default(180) }}
      {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
      -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
      -X PUT -H "Content-Type: application/json"
      -d '{{ dns_combined_payload | to_json }}'
      "{{ hs_api_url }}/dnss/{{ current_dns.json[0].uoid.uuid }}"
  register: dns_update_raw
  changed_when: true
  when:
    - not ansible_check_mode
    - dns_config.primary_server is defined
    - current_dns.json | length > 0

- name: "Parse DNS update result"
  ansible.builtin.set_fact:
    dns_update_result:
      status: "{{ (dns_update_raw.stdout_lines | default(['0']))[-1] | default('0') | int }}"
  when:
    - not ansible_check_mode
    - dns_update_raw is not skipped

- name: "Display DNS update status"
  ansible.builtin.debug:
    msg: >-
      DNS configuration updated:
      Primary={{ dns_config.primary_server }},
      Secondary={{ dns_config.secondary_server | default('none') }},
      Search domains={{ dns_config.search_domains | default([]) | join(', ') }}
