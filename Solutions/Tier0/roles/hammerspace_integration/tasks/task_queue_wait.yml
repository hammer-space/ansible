---
# Task Queue Monitoring - Wait until queue is below threshold
# Prevents overwhelming the Hammerspace cluster with too many simultaneous operations
# Reference: hs_ops tasks_count.yml and tasks_executing_count.yml

- name: "Check current QUEUED task count"
  ansible.builtin.shell:
    cmd: >-
      curl -s --max-time 60
      {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
      -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
      "{{ hs_api_url }}/tasks?spec=status%3Deq%3DQUEUED"
  register: queued_tasks_raw
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Parse queued tasks result"
  ansible.builtin.set_fact:
    queued_tasks_result:
      json: "{{ (queued_tasks_raw.stdout | default('') | trim | default('[]', true)) | from_json }}"

- name: "Display current queue depth"
  ansible.builtin.debug:
    msg: "Current queued tasks: {{ queued_tasks_result.json | default([]) | length }}"
  when: hammerspace_debug | default(false)

- name: "Wait for task queue to clear (threshold: {{ hammerspace_max_queued_tasks | default(10) }})"
  ansible.builtin.shell:
    cmd: >-
      curl -s --max-time 60
      {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
      -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
      "{{ hs_api_url }}/tasks?spec=status%3Deq%3DQUEUED"
  register: task_queue_check_raw
  changed_when: false
  until: ((task_queue_check_raw.stdout | default('') | trim | default('[]', true)) | from_json | length) < (hammerspace_min_queued_tasks | default(5))
  retries: "{{ hammerspace_task_queue_retries | default(100) }}"
  delay: "{{ hammerspace_task_queue_delay | default(10) }}"
  when:
    - not ansible_check_mode
    - hammerspace_task_queue_throttle | default(true)
    - queued_tasks_result.json is defined
    - (queued_tasks_result.json | length) > (hammerspace_max_queued_tasks | default(10))

- name: "Check current EXECUTING task count"
  ansible.builtin.shell:
    cmd: >-
      curl -s --max-time 60
      {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
      -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
      "{{ hs_api_url }}/tasks?spec=status%3Deq%3DEXECUTING"
  register: executing_tasks_raw
  changed_when: false
  failed_when: false
  check_mode: false
  when: hammerspace_monitor_executing_tasks | default(false)

- name: "Parse executing tasks result"
  ansible.builtin.set_fact:
    executing_tasks_result:
      json: "{{ (executing_tasks_raw.stdout | default('') | trim | default('[]', true)) | from_json }}"
  when: hammerspace_monitor_executing_tasks | default(false)

- name: "Wait for executing tasks to complete"
  ansible.builtin.shell:
    cmd: >-
      curl -s --max-time 60
      {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
      -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
      "{{ hs_api_url }}/tasks?spec=status%3Deq%3DEXECUTING"
  register: executing_check_raw
  changed_when: false
  until: ((executing_check_raw.stdout | default('') | trim | default('[]', true)) | from_json | length) < 1
  retries: "{{ hammerspace_task_queue_retries | default(100) }}"
  delay: "{{ hammerspace_task_queue_delay | default(10) }}"
  when:
    - not ansible_check_mode
    - hammerspace_monitor_executing_tasks | default(false)
    - hammerspace_wait_for_executing | default(false)
    - executing_tasks_result.json is defined
    - (executing_tasks_result.json | length) > 0

- name: "Display task queue status"
  ansible.builtin.debug:
    msg: >-
      Task Queue Status - QUEUED: {{ queued_tasks_result.json | default([]) | length }},
      EXECUTING: {{ executing_tasks_result.json | default([]) | length }}
  when: hammerspace_debug | default(false)
