---
# Shared boot device detection — identifies the disk containing the root filesystem
# Handles: direct partitions, LVM/device-mapper, NVMe partition suffixes
# Output: _detected_boot_device (string, e.g. "nvme2n1" or "sda")

- name: Identify boot device (device containing root filesystem)
  ansible.builtin.shell: |
    # Find the root filesystem source device
    root_source=$(findmnt -n -o SOURCE / 2>/dev/null)

    # Trace through LVM/device-mapper to the physical disk
    if echo "$root_source" | grep -q "mapper\|dm-"; then
      # LVM: get the physical volume, then trace to the base disk
      pv_device=$(pvs --noheadings -o pv_name 2>/dev/null | head -1 | xargs)
      if [ -n "$pv_device" ]; then
        # Strip partition number to get base disk (nvme2n1p3 -> nvme2n1, sda3 -> sda)
        base_disk=$(lsblk -no PKNAME "$pv_device" 2>/dev/null | head -1)
        if [ -z "$base_disk" ]; then
          # Fallback: strip partition suffix directly
          base_disk=$(echo "$pv_device" | sed 's|/dev/||' | sed 's/p\?[0-9]*$//')
        fi
        echo "$base_disk"
      else
        lsblk -no PKNAME "$root_source" 2>/dev/null | head -1
      fi
    else
      # Direct partition or disk
      parent=$(lsblk -no PKNAME "$root_source" 2>/dev/null | head -1)
      if [ -n "$parent" ]; then
        echo "$parent"
      else
        echo "$root_source" | sed 's|/dev/||' | sed 's/p\?[0-9]*$//'
      fi
    fi
  register: _boot_device_detection_raw
  changed_when: false

- name: Set detected boot device fact
  ansible.builtin.set_fact:
    _detected_boot_device: "{{ _boot_device_detection_raw.stdout | default('') | trim }}"

- name: Warn if boot device detection returned empty
  ansible.builtin.debug:
    msg: "WARNING: Boot device detection returned empty. All drives may be included in RAID — verify manually."
  when: _detected_boot_device | length == 0
