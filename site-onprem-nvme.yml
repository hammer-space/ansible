---
# Hammerspace Tier 0 - On-Premises NVMe Deployment
# For bare-metal servers with NVMe drives, software RAID, no firewall
# Usage: ansible-playbook -i inventory.yml site-onprem-nvme.yml

- name: Configure Storage and NFS for Hammerspace Tier 0 (On-Prem NVMe)
  hosts: storage_servers
  become: true
  gather_facts: true

  vars_files:
    - vars/main.yml

  vars:
    # On-prem NVMe overrides
    storage_type: "nvme"
    use_raid: true
    use_dynamic_discovery: true
    configure_firewall: false
    flush_iptables: false

  pre_tasks:
    # Force on-prem NVMe settings (highest precedence via set_fact)
    - name: Set on-prem NVMe configuration
      ansible.builtin.set_fact:
        storage_type: "nvme"
        use_raid: true
        use_dynamic_discovery: true
        configure_firewall: false
        flush_iptables: false

    - name: Verify we have the required variables
      ansible.builtin.assert:
        that:
          - raid_arrays is defined or individual_drives is defined or use_dynamic_discovery
          - nfs_exports is defined or use_dynamic_discovery
        fail_msg: "Required variables are not defined. Check vars/main.yml or enable use_dynamic_discovery"

    # Check if node is already registered in Hammerspace (to skip NFS restart)
    - name: Check if node already exists in Hammerspace
      ansible.builtin.command:
        cmd: >-
          curl -s -o /dev/stdout -w "\n%{http_code}" --max-time 30
          {{ '' if (hammerspace_api_validate_certs | default(false)) else '-k' }}
          -u "{{ hammerspace_api_user }}:{{ hammerspace_api_password }}"
          "https://{{ hammerspace_api_host }}:8443/mgmt/v1.2/rest/nodes/{{ hammerspace_node_name | default(inventory_hostname) | urlencode }}"
      register: hs_node_precheck_raw
      changed_when: false
      failed_when: false
      check_mode: false
      when:
        - hammerspace_api_host is defined
        - hammerspace_api_user is defined
        - hammerspace_api_password is defined

    - name: Set node_already_in_hammerspace fact
      ansible.builtin.set_fact:
        node_already_in_hammerspace: "{{ ((hs_node_precheck_raw.stdout_lines | default(['404']))[-1] | int) == 200 }}"
      when: hammerspace_api_host is defined

    - name: Display node registration status
      ansible.builtin.debug:
        msg: "Node '{{ hammerspace_node_name | default(inventory_hostname) }}' {{ 'is already registered in Hammerspace - will skip NFS service restart' if node_already_in_hammerspace | default(false) else 'is not yet registered in Hammerspace' }}"
      when: hammerspace_api_host is defined

  roles:
    # Dynamic NVMe discovery - groups drives by NUMA and excludes boot device
    - role: nvme_discovery
      tags: [discovery, nvme, storage]

    - role: precheck
      tags: [precheck, validation]

    - role: raid_setup
      tags: [raid, storage]

    - role: filesystem_setup
      tags: [filesystem, storage]

    - role: nfs_setup
      tags: [nfs]

    # Firewall skipped for on-prem (configure_firewall: false)

    # Hammerspace cluster integration via API
    - role: hammerspace_integration
      when: hammerspace_api_host is defined
      tags: [hammerspace, integration]

  post_tasks:
    - name: Run systemctl daemon-reload after fstab changes
      ansible.builtin.systemd:
        daemon_reload: true

    # =========================================================================
    # Generate Instance Report
    # =========================================================================
    - name: Set report file path
      ansible.builtin.set_fact:
        instance_report_file: "{{ playbook_dir }}/instance_report.csv"
      run_once: true

    - name: Create instance report CSV with header
      ansible.builtin.copy:
        dest: "{{ instance_report_file }}"
        content: "display_name,az\n"
        mode: '0644'
      delegate_to: localhost
      run_once: true
      when: not ansible_check_mode

    - name: Append instance data to report
      ansible.builtin.lineinfile:
        path: "{{ instance_report_file }}"
        line: "{{ inventory_hostname }},{{ hammerspace_volume_az_prefix | default('N/A') }}"
        mode: '0644'
      delegate_to: localhost
      when: not ansible_check_mode

    - name: Display instance report location
      ansible.builtin.debug:
        msg: |
          Instance report generated: {{ instance_report_file }}
          Instances: {{ ansible_play_hosts | length }}
      run_once: true

    - name: Display summary
      ansible.builtin.debug:
        msg: |
          ============================================
          HAMMERSPACE TIER 0 SETUP COMPLETE (On-Prem NVMe)
          ============================================
          - Storage type: NVMe
          - RAID arrays configured: {{ raid_arrays | default([]) | length }}
          - Mount points created: {{ mount_points | default([]) | length }}
          - NFS exports configured: {{ nfs_exports | default([]) | length }}
          - Firewall: SKIPPED (not configured)
          {% if hammerspace_api_host is defined %}
          - Hammerspace integration: ENABLED
            - Storage system registered: {{ hammerspace_node_name | default(inventory_hostname) }}
            - Volumes added: {{ mount_points | default([]) | length }}
          {% else %}
          - Hammerspace integration: SKIPPED (set hammerspace_api_host to enable)
          {% endif %}

          VERIFY:
          1. RAID status:
             cat /proc/mdstat

          2. Mounts:
             df -h | grep hammerspace

          3. NFS exports from another node:
             showmount -e {{ ansible_default_ipv4.address }}

          {% if hammerspace_api_host is defined %}
          4. Hammerspace CLI:
             anvil> node-list
             anvil> volume-list
          {% else %}
          4. Manual Hammerspace integration:
             anvil> node-add --type OTHER --name {{ inventory_hostname }} --ip {{ ansible_default_ipv4.address }}
             {% for mp in mount_points | default([]) %}
             anvil> volume-add --name {{ inventory_hostname }}::{{ mp.path }} --node-name {{ inventory_hostname }} --logical-volume-name {{ mp.path }}
             {% endfor %}
          {% endif %}
          ============================================
